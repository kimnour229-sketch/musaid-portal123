{% extends "layout.html" %}
{% block title %}تغيير كلمة المرور{% endblock %}

{% block content %}
<div class="row justify-content-center ms-fade-up">
  <div class="col-lg-6 col-md-8">
    <nav aria-label="breadcrumb"><ol class="breadcrumb small mb-2">
      <li class="breadcrumb-item"><a href="/" class="text-decoration-none">الرئيسية</a></li>
      <li class="breadcrumb-item active">تغيير كلمة المرور</li>
    </ol></nav>

    <div class="card">
      <div class="card-header py-3"><h5 class="fw-bold mb-0"><i class="bi bi-shield-lock-fill text-brand me-2"></i> تغيير كلمة المرور</h5></div>
      <div class="card-body p-4">
        <form method="POST" action="/change_password" id="changePwForm">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">كلمة المرور الحالية</label>
            <div class="position-relative">
              <input type="password" name="current_password" id="currentPw" class="form-control" required autocomplete="current-password" style="padding-inline-end:3rem;">
              <button type="button" class="btn btn-icon position-absolute top-50 translate-middle-y text-muted" style="inset-inline-end:.35rem;" data-toggle-password="#currentPw" tabindex="-1"><i class="bi bi-eye"></i></button>
            </div>
          </div>

          <div class="mb-2">
            <label class="form-label">كلمة المرور الجديدة</label>
            <div class="position-relative">
              <input type="password" name="new_password" id="newPw" class="form-control" required minlength="8" autocomplete="new-password" style="padding-inline-end:3rem;">
              <button type="button" class="btn btn-icon position-absolute top-50 translate-middle-y text-muted" style="inset-inline-end:.35rem;" data-toggle-password="#newPw" tabindex="-1"><i class="bi bi-eye"></i></button>
            </div>
          </div>

          <!-- Strength meter -->
          <div class="mb-3">
            <div class="progress" style="height:.5rem;border-radius:var(--ms-radius-pill);">
              <div id="pwStrengthBar" class="progress-bar" style="width:0%;transition:.3s;"></div>
            </div>
            <small id="pwStrengthText" class="text-muted">قوة كلمة المرور</small>
          </div>

          <div class="mb-4">
            <label class="form-label">تأكيد كلمة المرور الجديدة</label>
            <div class="position-relative">
              <input type="password" name="confirm_password" id="confirmPw" class="form-control" required autocomplete="new-password" style="padding-inline-end:3rem;">
              <button type="button" class="btn btn-icon position-absolute top-50 translate-middle-y text-muted" style="inset-inline-end:.35rem;" data-toggle-password="#confirmPw" tabindex="-1"><i class="bi bi-eye"></i></button>
            </div>
            <small id="pwMatchText" class="text-muted"></small>
          </div>

          <div class="small text-muted mb-3">
            <i class="bi bi-info-circle me-1"></i> 8 خانات على الأقل، وتشمل حرفاً ورقماً.
          </div>

          <button type="submit" class="btn btn-gradient w-100" id="changePwBtn">حفظ كلمة المرور الجديدة</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
  var newPw = document.getElementById('newPw');
  var confirmPw = document.getElementById('confirmPw');
  var bar = document.getElementById('pwStrengthBar');
  var text = document.getElementById('pwStrengthText');
  var matchText = document.getElementById('pwMatchText');
  var btn = document.getElementById('changePwBtn');

  function score(pw) {
    var s = 0;
    if (pw.length >= 8) s++;
    if (pw.length >= 12) s++;
    if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) s++;
    if (/\d/.test(pw)) s++;
    if (/[^A-Za-z0-9]/.test(pw)) s++;
    return s; // 0..5
  }

  var LEVELS = [
    { w: '0%',  c: '',            t: 'قوة كلمة المرور' },
    { w: '25%', c: 'bg-danger',   t: 'ضعيفة جداً' },
    { w: '45%', c: 'bg-danger',   t: 'ضعيفة' },
    { w: '65%', c: 'bg-warning',  t: 'متوسطة' },
    { w: '85%', c: 'bg-info',     t: 'جيدة' },
    { w: '100%',c: 'bg-success',  t: 'قوية' }
  ];

  function refresh() {
    var pw = newPw.value;
    var lvl = LEVELS[pw ? score(pw) : 0];
    bar.className = 'progress-bar ' + lvl.c;
    bar.style.width = lvl.w;
    text.textContent = lvl.t;

    if (confirmPw.value) {
      var ok = confirmPw.value === pw;
      matchText.textContent = ok ? 'متطابقتان ✓' : 'غير متطابقتين';
      matchText.className = 'small ' + (ok ? 'text-success' : 'text-danger');
    } else {
      matchText.textContent = '';
    }
  }

  newPw.addEventListener('input', refresh);
  confirmPw.addEventListener('input', refresh);

  document.getElementById('changePwForm').addEventListener('submit', function (e) {
    if (confirmPw.value !== newPw.value) {
      e.preventDefault();
      if (window.MS) MS.toast('كلمتا المرور غير متطابقتين', 'warning');
    } else {
      btn.disabled = true;
    }
  });
})();
</script>
{% endblock %}
