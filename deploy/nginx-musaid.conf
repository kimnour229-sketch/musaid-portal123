# ============================================================
# Nginx site config for Musaid Portal
# Install:
#   sudo cp deploy/nginx-musaid.conf /etc/nginx/sites-available/musaid
#   sudo ln -s /etc/nginx/sites-available/musaid /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace musaid.example.ly with your real domain.
# The HTTPS (443) block below is normally written for you by Certbot
# (see SSL_SETUP.md). It is shown here for reference / manual setups.
# ============================================================

# ---- HTTP: redirect everything to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name musaid.example.ly www.musaid.example.ly;

    # Allow ACME HTTP-01 challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS: main site ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name musaid.example.ly www.musaid.example.ly;

    # --- TLS (paths managed by Certbot) ---
    ssl_certificate     /etc/letsencrypt/live/musaid.example.ly/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/musaid.example.ly/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Tighten as needed; allows the CDNs used by the templates (Bootstrap, fonts, Chart.js, jQuery, DataTables, SweetAlert).
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' https://ui-avatars.com data:; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com https://cdn.datatables.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.datatables.net https://code.jquery.com; connect-src 'self'" always;

    # --- Upload size: must be >= MAX_CONTENT_LENGTH (50MB) in app.py ---
    client_max_body_size 50M;

    # --- Static files served directly by Nginx (fast path) ---
    location /static/ {
        alias /opt/musaid/Musaid_Portal/static/;
        expires 7d;
        access_log off;
    }

    # --- App (proxied to Gunicorn via UNIX socket) ---
    location / {
        proxy_pass http://unix:/run/musaid/musaid.sock;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }
}
